<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpenseFlow — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
  input:invalid{
    border-left: 3px solid var(--crimson);
  }
  input:valid{
    border-left:green 3px solid;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .ef-root {
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image:url('media/loginback.png');
    background-size: cover;
    background-position: center;
    position: relative;
    overflow:hidden;
    border-radius: 12px;
  }

  .ef-root::before {
    content: '';
    position: absolute;
    inset: 0;
    
  }

  .ef-glow {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,38,53,0.45) 0%, transparent 70%);
    top: -80px; left: -60px;
    pointer-events: none;
  }
  .ef-glow2 {
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(80,10,20,0.55) 0%, transparent 70%);
    bottom: -60px; right: -40px;
    pointer-events: none;
  }

  .ef-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 52px;
    position: relative;
    z-index: 2;
    border-bottom: 1px solid rgba(255,200,200,0.1);
    background: rgba(255,245,245,0.2);
    backdrop-filter: blur(8px);
  }
  .ef-nav span {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(186, 255, 201,0.7);
    letter-spacing: 0.12em;
  }

  .ef-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    z-index: 2;
  }

  .ef-brand {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 36px;
    color: lavenderblush;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
    text-shadow: 0 2px 18px rgba(139,38,53,0.5);
  }

  .ef-sub {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: rgba(210,160,160,0.85);
    margin-bottom: 22px;
    letter-spacing: 0.04em;
  }

  .ef-card {
    background: rgba(255, 245, 245, 0.07);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 180, 180, 0.18);
    border-radius: 10px;
    padding: 28px 30px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 8px 32px rgba(60,8,16,0.35), inset 0 1px 0 rgba(255,200,200,0.12);
  }

  .ef-card h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 17px;
    color: lavenderblush;
    margin-bottom: 3px;
  }

  .ef-card .ef-hint {
    font-size: 13px;
    color: rgba(255,218,185,0.8);
    font-style: italic;
    margin-bottom: 18px;
  }

  .ef-field { margin-bottom: 10px; }

  .ef-label {
    display: block;
    font-size: 10px;
    color: lavenderblush;
    font-weight: 600;
    font-family: 'EB Garamond', serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .ef-input {
    width: 100%;
    padding: 9px 12px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,160,160,0.2);
    border-radius: 5px;
    color: #f5e0e0;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    box-sizing: border-box;
  }
  .ef-input::placeholder { color: rgba(200,130,130,0.5); font-style: italic; }
  .ef-input:focus {
    border-color: rgba(200,80,90,0.6);
    background: rgba(255,255,255,0.11);
  }

  .ef-divider {
    height: 1px;
    background: rgba(255,160,160,0.15);
    margin: 16px 0;
  }

  .ef-btn {
    width: 100%;
    padding: 11px;
    background: rgba(139,38,53,0.75);
    border: 1px solid rgba(200,80,100,0.4);
    border-radius: 50px;
    color: #ffe0e0;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    backdrop-filter: blur(4px);
  }
  .ef-btn:hover { background: rgba(168,48,64,0.85); }
  .ef-btn:active { transform: scale(0.98); }

  .ef-footer {
    text-align: center;
    margin-top: 12px;
    font-size: 12px;
    color: rgba(200,140,140,0.65);
    font-style: italic;
  }
  .ef-footer a { color: rgba(220,120,130,0.9); text-decoration: none; }

  .ef-strip {
    height: 10px;
    background: linear-gradient(90deg, #2a0810, #6b1a27, #2a0810);
    border-radius: 0 0 12px 12px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  
  /* OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(20,4,6,0.62);
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .popup {
    background: #fff;
    border-top: 5px solid var(--crimson);
    border-radius: 8px;
    padding: 48px 44px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    transform: scale(0.88) translateY(16px);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    position: relative;
    overflow: hidden;
  }
  .overlay.show .popup { transform: scale(1) translateY(0); }

  .popup::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--crimson-deep), var(--crimson), var(--crimson-deep));
  }

  .popup-moon {
    width: 66px; height: 66px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #7a1a1a, #3d0a0a 60%, #1a0505);
    margin: 0 auto 20px;
  }

  .popup h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #6b1a27;
    margin-bottom: 8px;
  }
  .popup h2 span { color: #8b2635; }

  .popup p {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: #5a2a30;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .popup-btn {
    display: inline-block;
    padding: 13px 36px;
    background: #8b2635;
    border-radius: 50px;
    color: #fff;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.15s;
    border: none;
  }
  .popup-btn:hover { background: #a83040; }
  .popup-btn:active { transform: scale(0.97); }

  .spark {
    position: absolute;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    line-height: 1;
    user-select: none;
  }
  .spark.go { animation: sparkFly 1.1s ease-out forwards; }
  @keyframes sparkFly {
    0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx),var(--ty)) rotate(var(--tr)) scale(0.4); }
  }

</style>
</head>
<body>

  <div class="ef-root">
  <div class="ef-glow"></div>
  <div class="ef-glow2"></div>

  <nav class="ef-nav">
    <span>Ad meliora</span>
  </nav>

  <main class="ef-main">
    <div class="ef-brand">EXPENSE&nbsp;&nbsp;FLOW</div>
    <p class="ef-sub">Sign in to track your progress</p>

    <div class="ef-card">
      <h2>Sign In</h2>
      <p class="ef-hint">Ready to check your progress?</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="ef-field">
        <label class="ef-label" for="name">Your Name</label>
        <input class="ef-input" type="text" id="name" placeholder="e.g. Arjun" autocomplete="off">
      </div>
      <div class="ef-field">
        <label class="ef-label" for="email">Email Address</label>
        <input class="ef-input" type="email" id="email" 
        placeholder="you@gmail.com" 
                pattern=".+@gmail\.com$" 
                title="Please enter a valid @gmail.com address" 
                required>
      </div>
      <div class="ef-field">
        <label class="ef-label" for="ef-pass">Password</label>
        <input class="ef-input" type="password" id="pass" placeholder="••••••••">
      </div>

    

      <div class="ef-divider"></div>
      <button class="ef-btn" type="submit">Login</button>

      <p class="ef-footer">No account? <a href="#">Create one</a></p>
    </form>         
  </main>

  <div class="ef-strip"></div>

  <!-- Welcome Popup -->
  <div class="overlay" id="overlay">
    <div class="popup" id="popup">
      <div class="popup-moon"></div>
      <h2>Welcome, <span id="popup-name">Friend</span>!</h2>
      <p>Welcome back to the world of Budgeting.<br>Ready to check your progress?</p>
      <a href="dashboard.html" class="popup-btn" onclick="goHome(event)">View Dashboard →</a>
    </div>
  </div>

<script>
  function handleLogin(e) {
    e.preventDefault();   // stops page reload
    const nameVal = document.getElementById('name').value.trim();
    document.getElementById('popup-name').textContent = nameVal || 'Friend';
    document.getElementById('overlay').classList.add('show');
    spawnSparks();
}

  function goHome(e) {
    e.preventDefault();
    document.getElementById('overlay').classList.remove('show');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 300);
  }

  function spawnSparks() {
    const popup = document.getElementById('popup');
    const colors = ['#8b2635','#c05060','#3d0d14','#e8a0a8','#6b1a27'];
    const hearts = ['♥','❤','♡'];
    for (let i = 0; i < 50; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      s.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      s.style.color = colors[i % colors.length];
      s.style.fontSize = (10 + Math.random() * 10) + 'px';
      s.style.left = (20 + Math.random() * 60) + '%';
      s.style.top  = (10 + Math.random() * 40) + '%';
      const angle = Math.random() * Math.PI * 2;
      const dist  = 60 + Math.random() * 80;
      s.style.setProperty('--tx', Math.cos(angle)*dist + 'px');
      s.style.setProperty('--ty', Math.sin(angle)*dist + 'px');
      s.style.setProperty('--tr', (Math.random()*30 - 15) + 'deg');
      s.style.animationDelay = (Math.random() * 0.3) + 's';
      popup.appendChild(s);
      setTimeout(() => s.classList.add('go'), 50);
      setTimeout(() => s.remove(), 1600);
    }
  }

  
</script>
</body>
</html>
