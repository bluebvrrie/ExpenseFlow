<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpenseFlow — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  input:invalid{
    border-left: 3px solid var(--crimson);
  }
  input:valid{
    border-left:green 3px solid;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0f0;
    --crimson: #8b2635;
    --crimson-dark: #6b1a27;
    --crimson-deep: #3d0d14;
    --crimson-light: #a83040;
    --text-dark: #2a0a0f;
    --text-mid: #5a2a30;
    --text-light: #9a7070;
    --border: rgba(139,38,53,0.18);
  }

  body {
    font-family: 'Garamond', serif;
    background: var(--bg);
    min-height: 100vh;
    max-height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  nav {
    background: white;
    background-image:url('pictures/nav3.jpeg');
    background-size: cover;
    background-position: center;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }

  

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(40px, 7vw, 68px);
    color: var(--crimson);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    animation: fadeDown 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  .brand-sub {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text-mid);
    font-size: 18px;
    margin-bottom: 32px;
    animation: fadeDown 0.7s 0.08s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: rgba(255,255,255,0.93);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 44px 48px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 4px 28px rgba(100,20,30,0.09);
    animation: fadeUp 0.7s 0.12s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--crimson-dark);
    margin-bottom: 4px;
  }

  .card .hint {
    font-size: 15px;
    color: var(--text-light);
    font-style: italic;
    margin-bottom: 26px;
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-mid);
    font-weight: 600;
    font-family: 'EB Garamond', serif;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dark);
    font-family: 'EB Garamond', serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  input::placeholder { color: #c0a0a5; font-style: italic; }
  input:focus { border-color: var(--crimson-light); }

  .divider { height: 1px; background: var(--border); margin: 22px 0; }

  button.login-btn {
    width: 100%;
    padding: 14px;
    background: var(--crimson);
    border: none;
    border-radius: 50px;
    color: #fff;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  button.login-btn:hover { background: var(--crimson-light); }
  button.login-btn:active { transform: scale(0.98); }

  .footer-note {
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
    color: var(--text-light);
    font-style: italic;
  }
  .footer-note a { color: var(--crimson); text-decoration: none; }

  /* OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(20,4,6,0.62);
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .popup {
    background: #fff;
    border-top: 5px solid var(--crimson);
    border-radius: 8px;
    padding: 48px 44px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    transform: scale(0.88) translateY(16px);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    position: relative;
    overflow: hidden;
  }
  .overlay.show .popup { transform: scale(1) translateY(0); }

  .popup::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--crimson-deep), var(--crimson), var(--crimson-deep));
  }

  .popup-moon {
    width: 66px; height: 66px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #7a1a1a, #3d0a0a 60%, #1a0505);
    margin: 0 auto 20px;
  }

  .popup h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--crimson-dark);
    margin-bottom: 8px;
  }
  .popup h2 span { color: var(--crimson); }

  .popup p {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--text-mid);
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .popup-btn {
    display: inline-block;
    padding: 13px 36px;
    background: var(--crimson);
    border-radius: 50px;
    color: #fff;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.15s;
    border: none;
  }
  .popup-btn:hover { background: var(--crimson-light); }
  .popup-btn:active { transform: scale(0.97); }

  .spark {
    position: absolute;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    line-height: 1;
    user-select: none;
  }
  .spark.go { animation: sparkFly 1.1s ease-out forwards; }
  @keyframes sparkFly {
    0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx),var(--ty)) rotate(var(--tr)) scale(0.4); }
  }

  .bottom-strip {
    background: linear-gradient(180deg, #4a1020 0%, #2a0810 100%);
    height: 80px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<nav>
  <h2 align="center" style="font-family: 'Brush Script MT', cursive; color:blanchedalmond; ">Ad meliora</h2>
</nav>

<main>
  <div class="brand">EXPENSEFLOW</div>
  <p class="brand-sub">Sign in to track your progress</p>

  <div class="card">
    <h2>Sign In</h2>
    <p class="hint">Ready to check your progress?</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="e.g. Arjun" autocomplete="off">
    </div>
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" 
      placeholder="you@gmail.com" 
               pattern=".+@gmail\.com$" 
               title="Please enter a valid @gmail.com address" 
               required>
    </div>
    <div class="field">
      <label for="pass">Password</label>
      <input type="password" id="pass" placeholder="••••••••">
    </div>

   

    <div class="divider"></div>
<button type="submit" class="login-btn">Login</button>
</form>         
</main>

<div class="bottom-strip"></div>

<!-- Welcome Popup -->
<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    <div class="popup-moon"></div>
    <h2>Welcome, <span id="popup-name">Friend</span>!</h2>
    <p>Welcome back to the world of Budgeting.<br>Ready to check your progress?</p>
    <a href="index.html" class="popup-btn" onclick="goHome(event)">View Dashboard →</a>
  </div>
</div>

<script>
  function handleLogin(e) {
    e.preventDefault();   // stops page reload
    const nameVal = document.getElementById('name').value.trim();
    document.getElementById('popup-name').textContent = nameVal || 'Friend';
    document.getElementById('overlay').classList.add('show');
    spawnSparks();
}

  function goHome(e) {
    e.preventDefault();
    document.getElementById('overlay').classList.remove('show');
    setTimeout(() => { window.location.href = 'index.html'; }, 300);
  }

  function spawnSparks() {
    const popup = document.getElementById('popup');
    const colors = ['#8b2635','#c05060','#3d0d14','#e8a0a8','#6b1a27'];
    const hearts = ['♥','❤','♡'];
    for (let i = 0; i < 50; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      s.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      s.style.color = colors[i % colors.length];
      s.style.fontSize = (10 + Math.random() * 10) + 'px';
      s.style.left = (20 + Math.random() * 60) + '%';
      s.style.top  = (10 + Math.random() * 40) + '%';
      const angle = Math.random() * Math.PI * 2;
      const dist  = 60 + Math.random() * 80;
      s.style.setProperty('--tx', Math.cos(angle)*dist + 'px');
      s.style.setProperty('--ty', Math.sin(angle)*dist + 'px');
      s.style.setProperty('--tr', (Math.random()*30 - 15) + 'deg');
      s.style.animationDelay = (Math.random() * 0.3) + 's';
      popup.appendChild(s);
      setTimeout(() => s.classList.add('go'), 50);
      setTimeout(() => s.remove(), 1600);
    }
  }

  
</script>
</body>
</html>
